<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Essay — H. Davidson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  header.essay-header{
    padding:22px 32px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
    position:relative; z-index:10; background:var(--paper);
  }
  .back-link{
    text-decoration:none; font-family:'IBM Plex Mono', monospace; font-size:0.72rem;
    letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft);
    border-bottom:1px solid var(--line); padding-bottom:2px;
  }
  .back-link:hover{border-bottom-color:var(--archive-red); color:var(--ink);}

  .stream figure{cursor:zoom-in;}

  .lightbox{
    position:fixed; inset:0; z-index:1000; background:rgba(17,17,17,0.96);
    display:none; align-items:center; justify-content:center; flex-direction:column;
  }
  .lightbox.open{display:flex;}
  .lightbox-img-wrap{
    max-width:92vw; max-height:78vh; display:flex; align-items:center; justify-content:center;
  }
  .lightbox img{max-width:92vw; max-height:78vh; width:auto; height:auto; object-fit:contain;}
  .lightbox-caption{
    color:var(--overlay-light); font-family:'IBM Plex Mono',monospace; font-size:0.75rem;
    letter-spacing:0.04em; margin-top:18px; text-align:center;
  }
  .lightbox-counter{
    color:var(--ash); font-family:'IBM Plex Mono',monospace; font-size:0.68rem;
    letter-spacing:0.08em; text-transform:uppercase; margin-top:8px;
  }
  .lightbox-close{
    position:absolute; top:24px; right:28px; z-index:1002;
    background:none; border:1px solid rgba(247,246,242,0.4); color:var(--overlay-light);
    font-family:'IBM Plex Mono',monospace; font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase;
    padding:9px 16px; cursor:pointer;
  }
  .lightbox-close:hover{border-color:var(--overlay-light);}
  .lightbox-arrow{
    position:absolute; top:50%; transform:translateY(-50%); z-index:1002;
    background:none; border:1px solid rgba(247,246,242,0.4); color:var(--overlay-light);
    width:52px; height:52px; font-size:1.4rem; cursor:pointer; line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  .lightbox-arrow:hover{border-color:var(--overlay-light); background:rgba(247,246,242,0.08);}
  .lightbox-arrow.prev{left:20px;}
  .lightbox-arrow.next{right:20px;}
  @media (max-width:700px){
    .lightbox-arrow{width:42px; height:42px; font-size:1.15rem;}
    .lightbox-arrow.prev{left:8px;}
    .lightbox-arrow.next{right:8px;}
    .lightbox-close{top:14px; right:14px;}
  }
</style>
</head>
<body>

<header class="essay-header">
  <a class="brand" href="index.html">H. Davidson</a>
  <a class="back-link" href="work.html">← Back to Work</a>
</header>

<div id="content">
  <div class="loading mono">Loading essay…</div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">Close ✕</button>
  <button class="lightbox-arrow prev" id="lightboxPrev" aria-label="Previous photo">‹</button>
  <div class="lightbox-img-wrap">
    <img id="lightboxImg" src="" alt="">
  </div>
  <button class="lightbox-arrow next" id="lightboxNext" aria-label="Next photo">›</button>
  <div class="lightbox-caption" id="lightboxCaption"></div>
  <div class="lightbox-counter" id="lightboxCounter"></div>
</div>

<script src="site.js"></script>
<script>
  function getParam(name){
    return new URLSearchParams(window.location.search).get(name);
  }

  async function loadEssay(){
    const id = getParam('id');
    const content = document.getElementById('content');
    const data = await loadJSON('content/essays.json');
    if(!data){
      content.innerHTML = `<div class="not-found mono">Couldn't load this essay. Make sure this page is being viewed on your live site (not opened directly from a file), since it needs to fetch content/essays.json.</div>`;
      return;
    }
    const items = data.items || [];
    const index = items.findIndex(e => e.id === id);

    if(index === -1){
      content.innerHTML = `<div class="not-found mono">Essay not found. <a href="work.html" style="color:var(--archive-red);">Return to Work →</a></div>`;
      return;
    }

    const essay = items[index];
    document.title = essay.title + ' — H. Davidson';

    const photos = (essay.photos && essay.photos.length) ? essay.photos : [
      {image: (essay.preview && essay.preview.image), caption: essay.label}
    ];

    const streamHtml = photos.map((p, i) => `
      <figure data-index="${i}" class="lightbox-trigger">
        <img src="${esc(p.image)}" alt="${esc(p.caption || essay.title)}">
        ${p.caption ? `<figcaption>${esc(p.caption)}</figcaption>` : ''}
      </figure>`).join('');

    const prevItem = items[(index - 1 + items.length) % items.length];
    const nextItem = items[(index + 1) % items.length];
    const showNav = items.length > 1;

    content.innerHTML = `
      <div class="wrap essay-head">
        <div class="essay-eyebrow mono">${esc(essay.label)}</div>
        <h1>${esc(essay.title)}</h1>
        <p>${esc(essay.description)}</p>
      </div>
      <div class="wrap stream">${streamHtml}</div>
      ${showNav ? `
      <div class="wrap nav-between">
        <a href="essay.html?id=${encodeURIComponent(prevItem.id)}">
          <span class="dir">← Previous</span>${esc(prevItem.title)}
        </a>
        <a href="essay.html?id=${encodeURIComponent(nextItem.id)}" style="text-align:right;">
          <span class="dir">Next →</span>${esc(nextItem.title)}
        </a>
      </div>` : ''}
    `;

    initLightbox(photos, essay.title);
  }

  function initLightbox(photos, essayTitle){
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightboxImg');
    const lbCaption = document.getElementById('lightboxCaption');
    const lbCounter = document.getElementById('lightboxCounter');
    let current = 0;

    function show(i){
      current = (i + photos.length) % photos.length;
      const p = photos[current];
      lbImg.src = p.image;
      lbImg.alt = p.caption || essayTitle;
      lbCaption.textContent = p.caption || '';
      lbCounter.textContent = (current + 1) + ' / ' + photos.length;
    }

    function open(i){
      show(i);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function close(){
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.lightbox-trigger').forEach(fig => {
      fig.addEventListener('click', () => open(parseInt(fig.dataset.index, 10)));
    });

    document.getElementById('lightboxClose').addEventListener('click', close);
    document.getElementById('lightboxPrev').addEventListener('click', () => show(current - 1));
    document.getElementById('lightboxNext').addEventListener('click', () => show(current + 1));

    lightbox.addEventListener('click', (e) => {
      if(e.target === lightbox) close();
    });

    document.addEventListener('keydown', (e) => {
      if(!lightbox.classList.contains('open')) return;
      if(e.key === 'ArrowLeft') show(current - 1);
      else if(e.key === 'ArrowRight') show(current + 1);
      else if(e.key === 'Escape') close();
    });
  }

  loadEssay();
</script>

</body>
</html>
